<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Formation Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 320px; background: #16213e; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #0f3460; }
.sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 4px; }
.sidebar select, .sidebar input, .sidebar button { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 13px; }
.sidebar button { cursor: pointer; background: #0f3460; border: none; font-weight: 600; transition: background 0.2s; }
.sidebar button:hover { background: #1a5276; }
.sidebar button.danger { background: #922; }
.sidebar button.danger:hover { background: #b33; }
.sidebar button.export { background: #1d8348; }
.sidebar button.export:hover { background: #28a745; }

.section { background: #1a1a2e; border-radius: 8px; padding: 12px; }
.row { display: flex; gap: 6px; margin-bottom: 6px; }
.row input { flex: 1; }
.row select.pos { width: 70px; flex: none; }

/* Roster list */
.roster-list { max-height: 200px; overflow-y: auto; }
.roster-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.roster-item:hover { background: #0f3460; }
.roster-item.starter { border-left: 3px solid #28a745; }
.roster-item.sub { border-left: 3px solid #f39c12; }
.roster-item .name { flex: 1; }
.roster-item .pos { color: #888; font-size: 11px; }
.roster-item .pos-edit { width: 60px; flex: none; padding: 2px 4px; font-size: 11px; background: #0f3460; border: 1px solid #1a5276; color: #eee; border-radius: 4px; }
.roster-item .actions { display: flex; gap: 4px; }
.roster-item .actions button { width: auto; padding: 2px 6px; font-size: 11px; }

/* Field */
.field-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
#field-wrapper { position: relative; width: 560px; height: 780px; }
#field { width: 100%; height: 100%; border-radius: 4px; }

/* Player tokens */
.player-token { position: absolute; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: grab; transform: translate(-50%, -50%); user-select: none; border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: box-shadow 0.2s; font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
.player-token:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.6); }
.player-token.dragging { cursor: grabbing; box-shadow: 0 6px 20px rgba(0,0,0,0.7); z-index: 100; }
.player-token .token-name { font-size: 9px; line-height: 1; max-width: 42px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-token.gk { background: #f39c12; }
.player-token.def { background: #2980b9; }
.player-token.mid { background: #27ae60; }
.player-token.fwd { background: #c0392b; }

/* Save/Load */
.save-row { display: flex; gap: 6px; }
.save-row input { flex: 1; }
.save-row button { width: auto; padding: 8px 12px; }
.saved-list { max-height: 100px; overflow-y: auto; margin-top: 6px; }
.saved-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; font-size: 12px; border-radius: 4px; }
.saved-item:hover { background: #0f3460; }
.saved-item button { width: auto; padding: 2px 8px; font-size: 11px; }

/* Export area (hidden, used for capture) */
#export-area { position: absolute; left: -9999px; top: 0; background: #fff; padding: 12px; }
#export-area h1 { font-size: 14px; color: #333; margin-bottom: 6px; }
#export-area h3 { font-size: 11px; margin-bottom: 2px; }
#export-area table { width: auto; border-collapse: collapse; margin-top: 2px; font-size: 11px; color: #333; }
#export-area table th, #export-area table td { border: 1px solid #ccc; padding: 2px 6px; text-align: left; }
#export-area table th { background: #eee; }
#export-field { width: 360px; height: 500px; }
#export-layout { display: flex; gap: 12px; align-items: flex-start; }
#export-layout .export-col { font-size: 11px; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Formation</h2>
  <div class="section">
    <select id="formation-select">
      <option value="4-4-2">4-4-2</option>
      <option value="4-3-3">4-3-3</option>
      <option value="3-5-2">3-5-2</option>
      <option value="4-2-3-1">4-2-3-1</option>
      <option value="4-5-1">4-5-1</option>
      <option value="3-4-3">3-4-3</option>
      <option value="4-1-4-1">4-1-4-1</option>
      <option value="4-4-1-1">4-4-1-1</option>
    </select>
    <div style="display:flex;gap:10px;margin-top:8px;font-size:11px;">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#f39c12;"></span> GK</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#2980b9;"></span> DEF</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#27ae60;"></span> MID</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#c0392b;"></span> FWD</span>
    </div>
  </div>

  <h2>Add Player</h2>
  <div class="section">
    <div class="row">
      <input type="text" id="player-name" placeholder="Name">
      <select id="player-pos" class="pos">
        <option>GK</option><option>CB</option><option>LCB</option><option>RCB</option><option>LB</option><option>RB</option><option>LWB</option><option>RWB</option>
        <option>CDM</option><option>CM</option><option>CAM</option>
        <option>LM</option><option>RM</option><option>LW</option><option>RW</option>
        <option>CF</option><option>ST</option>
      </select>
    </div>
    <button id="add-player-btn">Add Player</button>
  </div>

  <h2>Starters (11)</h2>
  <div class="section">
    <div class="roster-list" id="starters-list"></div>
  </div>

  <h2>Substitutes</h2>
  <div class="section">
    <div class="roster-list" id="subs-list"></div>
  </div>

  <h2>Save / Load</h2>
  <div class="section">
    <div class="save-row">
      <input type="text" id="save-name" placeholder="Roster name">
      <button id="save-btn">Save</button>
    </div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <h2>Export</h2>
  <div class="section">
    <button class="export" id="export-png-btn">Export PNG</button>
    <button class="export" id="export-pdf-btn" style="margin-top:6px;">Export PDF</button>
  </div>
</div>

<div class="field-container">
  <div id="field-wrapper">
    <svg id="field" viewBox="0 0 560 780" xmlns="http://www.w3.org/2000/svg">
      <rect width="560" height="780" fill="#2d8a4e"/>
      <rect x="30" y="30" width="500" height="720" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- Halfway line -->
      <line x1="30" y1="390" x2="530" y2="390" stroke="#fff" stroke-width="2"/>
      <!-- Center circle -->
      <circle cx="280" cy="390" r="65" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="280" cy="390" r="3" fill="#fff"/>
      <!-- Top penalty area -->
      <rect x="150" y="30" width="260" height="130" fill="none" stroke="#fff" stroke-width="2"/>
      <rect x="200" y="30" width="160" height="50" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="280" cy="120" r="3" fill="#fff"/>
      <path d="M 210 160 A 65 65 0 0 0 350 160" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- Bottom penalty area -->
      <rect x="150" y="620" width="260" height="130" fill="none" stroke="#fff" stroke-width="2"/>
      <rect x="200" y="700" width="160" height="50" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="280" cy="660" r="3" fill="#fff"/>
      <path d="M 210 620 A 65 65 0 0 1 350 620" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- Corner arcs -->
      <path d="M 30 40 A 10 10 0 0 0 40 30" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M 520 30 A 10 10 0 0 0 530 40" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M 30 740 A 10 10 0 0 1 40 750" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M 520 750 A 10 10 0 0 1 530 740" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- Goals -->
      <rect x="230" y="18" width="100" height="12" fill="none" stroke="#fff" stroke-width="2"/>
      <rect x="230" y="750" width="100" height="12" fill="none" stroke="#fff" stroke-width="2"/>
    </svg>
  </div>
</div>

<!-- Hidden export area -->
<div id="export-area"></div>

<script>
const FORMATIONS = {
  '4-4-2': {
    positions: ['GK','LB','CB','CB','RB','LM','CM','CM','RM','ST','ST'],
    coords: [[280,720],[100,580],[200,600],[360,600],[460,580],[100,400],[210,420],[350,420],[460,400],[200,200],[360,200]]
  },
  '4-3-3': {
    positions: ['GK','LB','CB','CB','RB','CM','CM','CM','LW','ST','RW'],
    coords: [[280,720],[100,580],[200,600],[360,600],[460,580],[180,400],[280,380],[380,400],[120,200],[280,160],[440,200]]
  },
  '3-5-2': {
    positions: ['GK','CB','CB','CB','LM','CDM','CM','CDM','RM','ST','ST'],
    coords: [[280,720],[160,600],[280,620],[400,600],[80,380],[200,420],[280,360],[360,420],[480,380],[210,180],[350,180]]
  },
  '4-2-3-1': {
    positions: ['GK','LB','CB','CB','RB','CDM','CDM','LW','CAM','RW','ST'],
    coords: [[280,720],[100,580],[210,610],[350,610],[460,580],[210,440],[350,440],[120,280],[280,260],[440,280],[280,140]]
  },
  '4-5-1': {
    positions: ['GK','LB','CB','CB','RB','LM','CM','CM','CM','RM','ST'],
    coords: [[280,720],[100,580],[200,610],[360,610],[460,580],[100,380],[200,400],[280,380],[360,400],[460,380],[280,160]]
  },
  '3-4-3': {
    positions: ['GK','CB','CB','CB','LM','CM','CM','RM','LW','ST','RW'],
    coords: [[280,720],[160,600],[280,620],[400,600],[100,390],[220,400],[340,400],[460,390],[140,180],[280,150],[420,180]]
  },
  '4-1-4-1': {
    positions: ['GK','LB','CB','CB','RB','CDM','LM','CM','CM','RM','ST'],
    coords: [[280,720],[100,580],[210,610],[350,610],[460,580],[280,470],[100,340],[220,340],[340,340],[460,340],[280,140]]
  },
  '4-4-1-1': {
    positions: ['GK','LB','CB','CB','RB','LM','CM','CM','RM','CAM','ST'],
    coords: [[280,720],[100,580],[210,610],[350,610],[460,580],[100,400],[220,420],[340,420],[460,400],[280,250],[280,130]]
  }
};

const POSITION_GROUPS = {
  GK: 'GK', CB: 'DEF', LCB: 'DEF', RCB: 'DEF', LB: 'DEF', RB: 'DEF', LWB: 'DEF', RWB: 'DEF',
  CDM: 'MID', CM: 'MID', CAM: 'MID', LM: 'MID', RM: 'MID',
  LW: 'FWD', RW: 'FWD', CF: 'FWD', ST: 'FWD'
};

const TOKEN_CLASS = { GK: 'gk', DEF: 'def', MID: 'mid', FWD: 'fwd' };

let roster = [];
let currentFormation = '4-4-2';
let playerPositions = {};
let slotOverrides = {};

function getStarters() { return roster.filter(p => p.starter); }
function getSubs() { return roster.filter(p => !p.starter); }

function assignSlots(starters) {
  const formation = FORMATIONS[currentFormation];
  const slots = new Array(formation.positions.length).fill(null);
  const assigned = new Set();

  const POSITION_COMPATIBILITY = {
    GK: ['GK'],
    CB: ['CB'], LCB: ['CB'], RCB: ['CB'],
    LB: ['LB','LWB'], RB: ['RB','RWB'], LWB: ['LB','LWB'], RWB: ['RB','RWB'],
    CDM: ['CDM','CM'], CM: ['CM','CDM','CAM'], CAM: ['CAM','CM'],
    LM: ['LM'], RM: ['RM'], LW: ['LW'], RW: ['RW'],
    CF: ['CF','ST'], ST: ['ST','CF']
  };

  starters.forEach((player, playerIdx) => {
    const override = slotOverrides[player.id];
    if (override !== undefined && slots[override] === null) {
      slots[override] = playerIdx;
      assigned.add(playerIdx);
    }
  });

  starters.forEach((player, playerIdx) => {
    if (assigned.has(playerIdx)) return;
    const compatible = POSITION_COMPATIBILITY[player.pos] || [player.pos];
    for (let i = 0; i < formation.positions.length; i++) {
      if (slots[i] !== null) continue;
      if (compatible.includes(formation.positions[i])) {
        slots[i] = playerIdx;
        assigned.add(playerIdx);
        return;
      }
    }
  });

  starters.forEach((player, playerIdx) => {
    if (assigned.has(playerIdx)) return;
    for (let i = 0; i < formation.positions.length; i++) {
      if (slots[i] === null) {
        slots[i] = playerIdx;
        assigned.add(playerIdx);
        return;
      }
    }
  });

  const result = new Array(starters.length);
  slots.forEach((playerIdx, slotIdx) => {
    if (playerIdx !== null) result[playerIdx] = slotIdx;
  });
  return result;
}

function addPlayer(name, pos, starter = false) {
  if (!name) return;
  const player = { id: Date.now() + Math.random(), name, pos, starter };
  roster.push(player);
  if (starter && getStarters().length > 11) {
    player.starter = false;
  }
  render();
}

function removePlayer(id) {
  roster = roster.filter(p => p.id !== id);
  render();
}

function changePosition(id, newPos) {
  const player = roster.find(p => p.id === id);
  if (player) {
    player.pos = newPos;
    delete playerPositions[id];
    delete slotOverrides[id];
    render();
  }
}

function toggleStarter(id) {
  const player = roster.find(p => p.id === id);
  if (!player) return;
  if (!player.starter && getStarters().length >= 11) return;
  player.starter = !player.starter;
  render();
}

function render() {
  renderRoster();
  renderField();
}

function renderRoster() {
  const startersEl = document.getElementById('starters-list');
  const subsEl = document.getElementById('subs-list');

  startersEl.innerHTML = getStarters().map(p => `
    <div class="roster-item starter">
      <span class="name">${p.name}</span>
      <select class="pos-edit" onchange="changePosition(${p.id}, this.value)">
        ${['GK','CB','LCB','RCB','LB','RB','LWB','RWB','CDM','CM','CAM','LM','RM','LW','RW','CF','ST'].map(pos => `<option${pos===p.pos?' selected':''}>${pos}</option>`).join('')}
      </select>
      <span class="actions">
        <button onclick="toggleStarter(${p.id})">→Sub</button>
        <button class="danger" onclick="removePlayer(${p.id})">×</button>
      </span>
    </div>
  `).join('');

  const grouped = { GK: [], DEF: [], MID: [], FWD: [] };
  getSubs().forEach(p => {
    const g = POSITION_GROUPS[p.pos] || 'MID';
    grouped[g].push(p);
  });

  let subsHtml = '';
  ['GK','DEF','MID','FWD'].forEach(g => {
    if (grouped[g].length === 0) return;
    subsHtml += `<div style="font-size:10px;color:#888;margin-top:4px;">${g}</div>`;
    grouped[g].forEach(p => {
      subsHtml += `
        <div class="roster-item sub">
          <span class="name">${p.name}</span>
          <select class="pos-edit" onchange="changePosition(${p.id}, this.value)">
            ${['GK','CB','LCB','RCB','LB','RB','LWB','RWB','CDM','CM','CAM','LM','RM','LW','RW','CF','ST'].map(pos => `<option${pos===p.pos?' selected':''}>${pos}</option>`).join('')}
          </select>
          <span class="actions">
            <button onclick="toggleStarter(${p.id})">→Start</button>
            <button class="danger" onclick="removePlayer(${p.id})">×</button>
          </span>
        </div>`;
    });
  });
  subsEl.innerHTML = subsHtml;
}

function renderField() {
  const wrapper = document.getElementById('field-wrapper');
  wrapper.querySelectorAll('.player-token').forEach(el => el.remove());

  const formation = FORMATIONS[currentFormation];
  const starters = getStarters();
  const slotAssignments = assignSlots(starters);

  starters.forEach((player, i) => {
    const slotIdx = slotAssignments[i] !== undefined ? slotAssignments[i] : i;
    const coords = formation.coords[slotIdx] || [280, 390];
    const customPos = playerPositions[player.id];
    const x = customPos ? customPos.x : coords[0];
    const y = customPos ? customPos.y : coords[1];
    const group = POSITION_GROUPS[player.pos] || 'MID';
    const cls = TOKEN_CLASS[group];

    const token = document.createElement('div');
    token.className = `player-token ${cls}`;
    token.style.left = `${(x / 560) * 100}%`;
    token.style.top = `${(y / 780) * 100}%`;
    token.innerHTML = `<span class="token-name">${player.name}</span>`;
    token.dataset.playerId = player.id;

    token.addEventListener('mousedown', startDrag);
    wrapper.appendChild(token);
  });
}

let dragTarget = null;
let dragOffset = { x: 0, y: 0 };

function startDrag(e) {
  e.preventDefault();
  dragTarget = e.currentTarget;
  dragTarget.classList.add('dragging');
  const rect = document.getElementById('field-wrapper').getBoundingClientRect();
  dragOffset.x = e.clientX - dragTarget.offsetLeft - dragTarget.offsetWidth / 2;
  dragOffset.y = e.clientY - dragTarget.offsetTop - dragTarget.offsetHeight / 2;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
  if (!dragTarget) return;
  const wrapper = document.getElementById('field-wrapper');
  const rect = wrapper.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  x = Math.max(22, Math.min(rect.width - 22, x));
  y = Math.max(22, Math.min(rect.height - 22, y));
  dragTarget.style.left = `${(x / rect.width) * 100}%`;
  dragTarget.style.top = `${(y / rect.height) * 100}%`;
}

function endDrag(e) {
  if (!dragTarget) return;
  dragTarget.classList.remove('dragging');
  const wrapper = document.getElementById('field-wrapper');
  const rect = wrapper.getBoundingClientRect();
  const dropX = (parseFloat(dragTarget.style.left) / 100) * 560;
  const dropY = (parseFloat(dragTarget.style.top) / 100) * 780;
  const draggedId = parseFloat(dragTarget.dataset.playerId);

  const starters = getStarters();
  const formation = FORMATIONS[currentFormation];
  const slotAssignments = assignSlots(starters);
  const draggedIdx = starters.findIndex(p => p.id === draggedId);

  let closestIdx = -1;
  let closestDist = Infinity;
  starters.forEach((player, i) => {
    if (i === draggedIdx) return;
    const slotIdx = slotAssignments[i] !== undefined ? slotAssignments[i] : i;
    const coords = formation.coords[slotIdx] || [280, 390];
    const custom = playerPositions[player.id];
    const px = custom ? custom.x : coords[0];
    const py = custom ? custom.y : coords[1];
    const dist = Math.hypot(dropX - px, dropY - py);
    if (dist < closestDist) { closestDist = dist; closestIdx = i; }
  });

  if (closestIdx >= 0 && closestDist < 50) {
    const otherPlayer = starters[closestIdx];

    const draggedSlot = slotAssignments[draggedIdx];
    const otherSlot = slotAssignments[closestIdx];
    slotOverrides[draggedId] = otherSlot;
    slotOverrides[otherPlayer.id] = draggedSlot;

    delete playerPositions[draggedId];
    delete playerPositions[otherPlayer.id];
    renderField();
    renderRoster();
  } else {
    playerPositions[draggedId] = { x: dropX, y: dropY };
  }

  dragTarget = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
}

// Formation change
document.getElementById('formation-select').addEventListener('change', (e) => {
  currentFormation = e.target.value;
  playerPositions = {};
  slotOverrides = {};
  renderField();
});

// Add player
document.getElementById('add-player-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  const pos = document.getElementById('player-pos').value;
  if (!name) return;
  const starter = getStarters().length < 11;
  addPlayer(name, pos, starter);
  document.getElementById('player-name').value = '';
  document.getElementById('player-name').focus();
});

document.getElementById('player-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('add-player-btn').click();
});

// Save/Load
function getSavedRosters() {
  return JSON.parse(localStorage.getItem('soccer-rosters') || '{}');
}

function saveRoster(name) {
  if (!name) return;
  const saved = getSavedRosters();
  saved[name] = { roster, currentFormation, playerPositions, slotOverrides };
  localStorage.setItem('soccer-rosters', JSON.stringify(saved));
  renderSavedList();
}

function loadRoster(name) {
  const saved = getSavedRosters();
  if (!saved[name]) return;
  roster = saved[name].roster;
  currentFormation = saved[name].currentFormation;
  playerPositions = saved[name].playerPositions || {};
  slotOverrides = saved[name].slotOverrides || {};
  document.getElementById('formation-select').value = currentFormation;
  render();
}

function deleteRoster(name) {
  const saved = getSavedRosters();
  delete saved[name];
  localStorage.setItem('soccer-rosters', JSON.stringify(saved));
  renderSavedList();
}

function renderSavedList() {
  const el = document.getElementById('saved-list');
  const saved = getSavedRosters();
  el.innerHTML = Object.keys(saved).map(name => `
    <div class="saved-item">
      <span>${name}</span>
      <span>
        <button onclick="loadRoster('${name}')">Load</button>
        <button class="danger" onclick="deleteRoster('${name}')">×</button>
      </span>
    </div>
  `).join('');
}

document.getElementById('save-btn').addEventListener('click', () => {
  const name = document.getElementById('save-name').value.trim();
  saveRoster(name);
  document.getElementById('save-name').value = '';
});

// Export
async function buildExportArea() {
  const area = document.getElementById('export-area');
  const formation = FORMATIONS[currentFormation];
  const starters = getStarters();
  const subs = getSubs();

  let fieldHtml = `<svg viewBox="0 0 560 780" xmlns="http://www.w3.org/2000/svg" style="width:360px;height:500px;">
    <rect width="560" height="780" fill="#2d8a4e"/>
    <rect x="30" y="30" width="500" height="720" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="30" y1="390" x2="530" y2="390" stroke="#fff" stroke-width="2"/>
    <circle cx="280" cy="390" r="65" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="280" cy="390" r="3" fill="#fff"/>
    <rect x="150" y="30" width="260" height="130" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="30" width="160" height="50" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="280" cy="120" r="3" fill="#fff"/>
    <path d="M 210 160 A 65 65 0 0 0 350 160" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="150" y="620" width="260" height="130" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="700" width="160" height="50" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="280" cy="660" r="3" fill="#fff"/>
    <path d="M 210 620 A 65 65 0 0 1 350 620" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="230" y="18" width="100" height="12" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="230" y="750" width="100" height="12" fill="none" stroke="#fff" stroke-width="2"/>`;

  const colors = { gk: '#f39c12', def: '#2980b9', mid: '#27ae60', fwd: '#c0392b' };

  const slotAssignments = assignSlots(starters);

  starters.forEach((player, i) => {
    const slotIdx = slotAssignments[i] !== undefined ? slotAssignments[i] : i;
    const baseCoords = formation.coords[slotIdx] || [280, 390];
    const custom = playerPositions[player.id];
    const x = custom ? custom.x : baseCoords[0];
    const y = custom ? custom.y : baseCoords[1];
    const group = POSITION_GROUPS[player.pos] || 'MID';
    const color = colors[TOKEN_CLASS[group]];
    fieldHtml += `<circle cx="${x}" cy="${y}" r="22" fill="${color}" stroke="#fff" stroke-width="2"/>`;
    fieldHtml += `<text x="${x}" y="${y + 4}" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">${player.name.substring(0, 10)}</text>`;
  });

  fieldHtml += '</svg>';

  const POSITION_ORDER = ['GK','LCB','CB','RCB','LB','RB','LWB','RWB','CDM','CM','CAM','LM','RM','LW','RW','CF','ST'];

  const startersByPos = {};
  starters.forEach(p => {
    if (!startersByPos[p.pos]) startersByPos[p.pos] = [];
    startersByPos[p.pos].push(p);
  });
  let startersTable = `<table><thead><tr><th>Position</th><th>Players</th></tr></thead><tbody>`;
  POSITION_ORDER.forEach(pos => {
    if (!startersByPos[pos]) return;
    startersTable += `<tr><td>${pos}</td><td>${startersByPos[pos].map(p => p.name).join(', ')}</td></tr>`;
  });
  startersTable += '</tbody></table>';

  let subsTable = '';
  if (subs.length > 0) {
    const subsByPos = {};
    subs.forEach(p => {
      if (!subsByPos[p.pos]) subsByPos[p.pos] = [];
      subsByPos[p.pos].push(p);
    });
    subsTable = '<table><thead><tr><th>Position</th><th>Players</th></tr></thead><tbody>';
    POSITION_ORDER.forEach(pos => {
      if (!subsByPos[pos]) return;
      subsTable += `<tr><td>${pos}</td><td>${subsByPos[pos].map(p => p.name).join(', ')}</td></tr>`;
    });
    subsTable += '</tbody></table>';
  }

  area.innerHTML = `
    <h1>Formation: ${currentFormation}</h1>
    <div id="export-layout">
      <div class="export-col">
        <h3 style="color:#333;">Starting XI</h3>
        ${startersTable}
      </div>
      <div id="export-field">${fieldHtml}</div>
      <div class="export-col">
        ${subs.length > 0 ? '<h3 style="color:#333;">Substitutes</h3>' + subsTable : ''}
      </div>
    </div>
  `;

  await new Promise(r => setTimeout(r, 100));
  return area;
}

document.getElementById('export-png-btn').addEventListener('click', async () => {
  const area = await buildExportArea();
  area.style.left = '0';
  area.style.position = 'fixed';
  area.style.zIndex = '9999';
  try {
    const dataUrl = await htmlToImage.toPng(area, { quality: 1, pixelRatio: 2 });
    const link = document.createElement('a');
    link.download = `formation-${currentFormation}.png`;
    link.href = dataUrl;
    link.click();
  } finally {
    area.style.left = '-9999px';
    area.style.position = 'absolute';
    area.style.zIndex = '';
  }
});

document.getElementById('export-pdf-btn').addEventListener('click', async () => {
  const area = await buildExportArea();
  area.style.left = '0';
  area.style.position = 'fixed';
  area.style.zIndex = '9999';
  try {
    const dataUrl = await htmlToImage.toPng(area, { quality: 1, pixelRatio: 2 });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const img = new Image();
    img.src = dataUrl;
    await new Promise(r => { img.onload = r; });
    const pdfWidth = 190;
    const pdfHeight = (img.height / img.width) * pdfWidth;
    pdf.addImage(dataUrl, 'PNG', 10, 10, pdfWidth, Math.min(pdfHeight, 270));
    pdf.save(`formation-${currentFormation}.pdf`);
  } finally {
    area.style.left = '-9999px';
    area.style.position = 'absolute';
    area.style.zIndex = '';
  }
});

// Init
renderSavedList();
render();
</script>
</body>
</html>
